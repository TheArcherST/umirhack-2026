services:
  rest-server:
    build: ./python
    command: run-rest-server
    restart: unless-stopped
    env_file: ./python/.env
    environment:
      HACK__SERVER__ROOT_PATH: /api
      HACK__SERVER__AGENT_ARTIFACTS_DIR: /opt/hack-agent-artifacts
    expose:
      - "80"
    volumes:
      - ./artifacts/rust/hack-agent:/opt/hack-agent-artifacts:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/openapi.json"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy

  rest-server-test:
    profiles:
      - tests
    build: ./python
    entrypoint: ["sh", "/usr/src/app/run-rest-server-test.sh"]
    restart: no
    env_file: ./python/.env
    environment:
      HACK__POSTGRES__USE_TEST_BY_DEFAULT: "true"
      HACK__SERVER__ROOT_PATH: ""
      HACK__SERVER__AGENT_ARTIFACTS_DIR: /opt/hack-agent-artifacts
    expose:
      - "80"
    volumes:
      - ./artifacts/rust/hack-agent:/opt/hack-agent-artifacts:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/openapi.json"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./python
    command: run-worker
    restart: unless-stopped
    env_file: ./python/.env
    depends_on:
      postgres:
        condition: service_healthy

  email-tasks-worker:
    build: ./python
    command: taskiq worker hack_backend.tasksd.email_tasks:broker
    restart: unless-stopped
    env_file: ./python/.env
    depends_on:
      redis:
        condition: service_healthy

  tool-alembic:
    profiles:
      - tools
    build: ./python
    entrypoint: /usr/src/app/alembic-entrypoint.sh
    restart: no
    environment:
      EXTERNAL_UID: ${COMPOSE__UID}
      EXTERNAL_GID: ${COMPOSE__GID}
    env_file: ./python/.env
    depends_on:
      postgres:
        condition: service_healthy

  tool-artifacts:
    profiles:
      - tools
    build: ./artifacts
    entrypoint:
      - sh
      - -lc
      - bash /workspace/scripts/build-agent-artifacts.sh $${ARTIFACTS_ARGS:---container-only}
    restart: no
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  run-integration-tests:
    profiles:
      - tests
    build: ./python
    entrypoint: ["sh", "/usr/src/app/run-integration-tests.sh"]
    env_file: ./python/.env
    environment:
      HACK__POSTGRES__USE_TEST_BY_DEFAULT: "true"
      HACK_TEST_BASE_URL: http://rest-server-test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rest-server-test:
        condition: service_healthy
