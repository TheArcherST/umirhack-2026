name: CI and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI config
        run: sh ./scripts/prepare-ci-config.sh

      - name: Run backend integration tests
        run: make test

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose --profile tests logs --no-color

      - name: Cleanup compose stack
        if: always()
        run: docker compose --profile tests down -v --remove-orphans

  rust-agent-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run Rust agent tests
        working-directory: rust
        run: cargo test --workspace --all-targets

  rust-agent-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build fresh agent artifacts through cross-build containers
        run: make artifacts args="--clean --container-only"

      - name: Verify published agent artifacts
        run: |
          test -f artifacts/hack-agent/linux/amd64/hack-agent
          test -f artifacts/hack-agent/linux/arm64/hack-agent
          test -f artifacts/hack-agent/windows/amd64/hack-agent.exe

  react-typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: react/package-lock.json

      - name: Install frontend dependencies
        working-directory: react
        run: npm ci

      - name: Run frontend typecheck
        working-directory: react
        run: npm run typecheck

      - name: Build frontend
        working-directory: react
        run: npm run web:build

  deploy:
    runs-on: ubuntu-latest
    needs:
      - backend-integration-tests
      - rust-agent-tests
      - rust-agent-artifacts
      - react-typecheck-and-build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    environment: prod
    steps:
      - name: Deploy exact tested revision
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            ./scripts/deploy.sh "${{ github.sha }}"
